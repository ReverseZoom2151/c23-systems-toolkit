<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330" role="img" aria-labelledby="title description">
  <title id="title">C23 Systems Toolkit component map</title>
  <desc id="description">Three command-line inputs flow through binary, list, and sketch components to textual and visual outputs.</desc>
  <rect width="900" height="330" rx="20" fill="#0f172a"/>
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="24" font-weight="700">C23 Systems Toolkit</text>
  <text x="450" y="68" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Three independent terminal components with explicit inputs and outputs</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(35 105)">
      <rect width="240" height="165" rx="14" fill="#172554" stroke="#60a5fa"/>
      <text x="20" y="34" fill="#bfdbfe" font-size="20" font-weight="700">Binary</text>
      <text x="20" y="63" fill="#e2e8f0" font-size="14">decimal / bits / hex</text>
      <text x="20" y="91" fill="#94a3b8" font-size="13">binary-tool --explain</text>
      <rect x="20" y="111" width="200" height="34" rx="7" fill="#0f172a"/>
      <text x="32" y="134" fill="#f8fafc" font-size="14">-12 → 1111_0100 → F4</text>
    </g>
    <g transform="translate(330 105)">
      <rect width="240" height="165" rx="14" fill="#052e16" stroke="#4ade80"/>
      <text x="20" y="34" fill="#bbf7d0" font-size="20" font-weight="700">Lists</text>
      <text x="20" y="63" fill="#e2e8f0" font-size="14">cursor + ownership</text>
      <text x="20" y="91" fill="#94a3b8" font-size="13">list-demo / generic_list</text>
      <rect x="20" y="111" width="54" height="34" rx="7" fill="#0f172a"/><rect x="94" y="111" width="54" height="34" rx="7" fill="#0f172a"/><rect x="168" y="111" width="54" height="34" rx="7" fill="#0f172a"/>
      <text x="38" y="134" fill="#f8fafc" font-size="14">10</text><text x="112" y="134" fill="#f8fafc" font-size="14">15</text><text x="186" y="134" fill="#f8fafc" font-size="14">20</text>
      <text x="78" y="134" fill="#4ade80" font-size="16">↔</text><text x="152" y="134" fill="#4ade80" font-size="16">↔</text>
    </g>
    <g transform="translate(625 105)">
      <rect width="240" height="165" rx="14" fill="#3b0764" stroke="#c084fc"/>
      <text x="20" y="34" fill="#e9d5ff" font-size="20" font-weight="700">Sketches</text>
      <text x="20" y="63" fill="#e2e8f0" font-size="14">packed byte streams</text>
      <text x="20" y="91" fill="#94a3b8" font-size="13">inspect / SVG / PGM / GIF</text>
      <rect x="20" y="111" width="200" height="34" rx="7" fill="#0f172a"/>
      <text x="35" y="134" fill="#f8fafc" font-size="14">.sk → trace + animation</text>
    </g>
  </g>
</svg>
