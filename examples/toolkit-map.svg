<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title description">
  <title id="title">C23 Systems Toolkit component map</title>
  <desc id="description">Four command-line components: binary data, linked lists, sketch decoding, and 3D terminal rendering.</desc>
  <rect width="900" height="430" rx="20" fill="#0f172a"/>
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="24" font-weight="700">C23 Systems Toolkit</text>
  <text x="450" y="68" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14">Small command-line components, explicit state, reproducible output</text>
  <g font-family="system-ui, sans-serif">
    <g transform="translate(35 105)">
      <rect width="390" height="125" rx="14" fill="#172554" stroke="#60a5fa"/>
      <text x="20" y="34" fill="#bfdbfe" font-size="20" font-weight="700">Binary</text>
      <text x="20" y="62" fill="#e2e8f0" font-size="14">decimal / bits / hexadecimal</text>
      <text x="20" y="89" fill="#94a3b8" font-size="13">binary-tool --explain</text>
      <text x="220" y="89" fill="#f8fafc" font-size="14">-12 → 1111_0100 → F4</text>
    </g>
    <g transform="translate(475 105)">
      <rect width="390" height="125" rx="14" fill="#052e16" stroke="#4ade80"/>
      <text x="20" y="34" fill="#bbf7d0" font-size="20" font-weight="700">Lists</text>
      <text x="20" y="62" fill="#e2e8f0" font-size="14">cursor + ownership</text>
      <text x="20" y="89" fill="#94a3b8" font-size="13">list-demo / generic_list</text>
      <text x="222" y="89" fill="#f8fafc" font-size="14">[10] ↔ [15] ↔ [20]</text>
    </g>
    <g transform="translate(35 265)">
      <rect width="390" height="125" rx="14" fill="#3b0764" stroke="#c084fc"/>
      <text x="20" y="34" fill="#e9d5ff" font-size="20" font-weight="700">Sketches</text>
      <text x="20" y="62" fill="#e2e8f0" font-size="14">packed byte streams</text>
      <text x="20" y="89" fill="#94a3b8" font-size="13">inspect / SVG / PGM / GIF</text>
      <text x="230" y="89" fill="#f8fafc" font-size="14">.sk → canvas</text>
    </g>
    <g transform="translate(475 265)">
      <rect width="390" height="125" rx="14" fill="#4c1d0b" stroke="#fb923c"/>
      <text x="20" y="34" fill="#fed7aa" font-size="20" font-weight="700">Renderer</text>
      <text x="20" y="62" fill="#e2e8f0" font-size="14">sampled 3D surface</text>
      <text x="20" y="89" fill="#fdba74" font-size="13">project + depth + luminance</text>
      <text x="235" y="89" fill="#f8fafc" font-size="14">frame → SVG / GIF</text>
    </g>
  </g>
</svg>
